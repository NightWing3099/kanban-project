# organizeME — Netlify Configuration
# Build and deploy the Vite React app from kanban-app/
[build]
  command = "cd kanban-app && npm install && npm run build"
  publish = "kanban-app/dist/"

# SPA fallback: all routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache immutable assets for 1 year (Vite generates content hashes)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"